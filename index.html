    // Self-contained sound engine using HTML5 Web Audio API
    const playSound = (isCorrect) => {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            if (isCorrect) {
                // Happy cheerful chime
                const now = ctx.currentTime;
                const notes = [261.63, 329.63, 392.00, 523.25]; // C4, E4, G4, C5
                notes.forEach((freq, idx) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, now + idx * 0.08);
                    
                    gain.gain.setValueAtTime(0.12, now + idx * 0.08);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + idx * 0.08 + 0.18);
                    
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(now + idx * 0.08);
                    osc.stop(now + idx * 0.08 + 0.2);
                });
            } else {
                // Sad crying slide down
                const now = ctx.currentTime;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(180, now);
                osc.frequency.linearRampToValueAtTime(80, now + 0.5);
                
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.5);
                
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(now);
                osc.stop(now + 0.5);
            }
        } catch (e) {
            console.warn("Audio Context blocked or not supported yet:", e);
        }
    };

            if (seed < 0.3) {
                offset = Math.floor(Math.random() * 5) + 1;
            } else if (seed < 0.6) {
                offset = -(Math.floor(Math.random() * 5) + 1);
            } else if (seed < 0.8) {
                offset = 10;
            } else {
                offset = -10;
            }
            
            const candidate = correctAnswer + offset;
            if (candidate > 0 && candidate !== correctAnswer) {
                choices.add(candidate);
            }
        }
        
        // Shuffle choices array
        return Array.from(choices).sort(() => Math.random() - 0.5);

    function App() {
        // App Navigation Pages: 'cover' | 'lobby' | 'play' | 'score' | 'history'
        const [currentPage, setCurrentPage] = useState('cover');
        const [selectedCategory, setSelectedCategory] = useState('perkalian');
        
        // Gameplay states
        const [currentQuestionIdx, setCurrentQuestionIdx] = useState(0);
        const [score, setScore] = useState(0);
        const [selectedAnswer, setSelectedAnswer] = useState(null);
        const [isAnswered, setIsAnswered] = useState(false);
        const [shuffledChoices, setShuffledChoices] = useState([]);
        const [answersLog, setAnswersLog] = useState([]); // array of { questionText, userAnswer, correctAnswer, isCorrect }
        
        // 15 seconds per-question timer states
        const [timeLeft, setTimeLeft] = useState(15);
        
        // Visual Croc Emotion feedback state: 'idle' | 'happy' | 'sad'
        const [crocMood, setCrocMood] = useState('idle');
        
        // Dynamic confetti/stars particles
        const [particles, setParticles] = useState([]);

        // Saved Transactions ledger state
        const [savedGames, setSavedGames] = useState([]);
        const [showSaveSuccessToast, setShowSaveSuccessToast] = useState(false);

        // Custom Confirmation Modal overlays (Strictly avoiding native alert/confirm popups)
        const [showExitConfirm, setShowExitConfirm] = useState(false);
        const [showClearConfirm, setShowClearConfirm] = useState(false);

        // Load saved games from localStorage if exists
        useEffect(() => {
            const savedData = localStorage.getItem('myki_math_cap_transactions');
            if (savedData) {
                try {
                    setSavedGames(JSON.parse(savedData));
                } catch(e) {
                    console.error("Failed parsing localStorage saves:", e);
                }
            }
        }, []);

        // Countdown timer hook that triggers every question and stops when answered
        useEffect(() => {
            if (currentPage !== 'play' || isAnswered) return;

            // Reset time back to 15 seconds on every new question
            setTimeLeft(15);

            const countdownInterval = setInterval(() => {
                setTimeLeft((prev) => {
                    if (prev <= 1) {
                        clearInterval(countdownInterval);
                        handleTimeOut(); // Trigger automatic failure on time out
                        return 0;
                    }
                    return prev - 1;
                });
            }, 1000);

            // Cleanup subscription on unmount or question change
            return () => clearInterval(countdownInterval);
        }, [currentPage, currentQuestionIdx, isAnswered]);

        const handleTimeOut = () => {
            if (isAnswered) return;
            
            setIsAnswered(true);
            setSelectedAnswer('Waktu Habis'); // Marker for timeout

            const activeQuestions = GAME_QUESTIONS[selectedCategory];
            const currentQuestion = activeQuestions[currentQuestionIdx];
            const correctVal = currentQuestion.answer;

            // Log time out as an incorrect entry
            setAnswersLog(prev => [...prev, {
                questionText: currentQuestion.text,
                userAnswer: 'Waktu Habis ⏱️',
                correctAnswer: correctVal,
                isCorrect: false
            }]);

            setCrocMood('sad');
            playSound(false);
        };

        const triggerCorrectSparkles = () => {
            const newParticles = [];
            for (let i = 0; i < 25; i++) {
                newParticles.push({
                    id: Math.random(),
                    x: Math.random() * 100, // percentage left
                    y: Math.random() * 60 + 20, // percentage top
                    size: Math.random() * 16 + 8,
                    color: ['#facc15', '#4ade80', '#60a5fa', '#f472b6', '#fb7185'][Math.floor(Math.random() * 5)],
                    delay: Math.random() * 0.4
                });
            }
            setParticles(newParticles);
            setTimeout(() => setParticles([]), 2500);
        };

        const handleAnswerSelection = (answer) => {
            if (isAnswered) return;
            
            setSelectedAnswer(answer);
            setIsAnswered(true);

            const activeQuestions = GAME_QUESTIONS[selectedCategory];
            const currentQuestion = activeQuestions[currentQuestionIdx];
            const correctVal = currentQuestion.answer;
            const correct = (answer === correctVal);

                                <div className="text-sm text-gray-700 font-medium">
                                    Kamu menjawab benar sebesar <span className="font-bold text-green-700">{percent}%</span> soal!
                                </div>
                            </div>

                            {/* Action Operations: Save Transaction & Navigation */}
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 w-full max-w-md mt-4">
                                <button
                                    onClick={saveGameTransaction}
                                    className="bg-amber-500 hover:bg-amber-600 text-white font-extrabold p-3.5 rounded-2xl shadow-md transition flex items-center justify-center space-x-2 border-b-4 border-amber-700"
                                >
                                    <i className="fas fa-save"></i>
                                    <span>Simpan Hasil Transaksi</span>
                                </button>

                                <button
                                    onClick={() => startNewGame(selectedCategory)}
                                    className="bg-green-500 hover:bg-green-600 text-white font-extrabold p-3.5 rounded-2xl shadow-md transition flex items-center justify-center space-x-2 border-b-4 border-green-700"
                                >
                                    <i className="fas fa-redo"></i>
                                    <span>Main Lagi</span>
                                </button>
                                
                                <button
                                    onClick={() => setCurrentPage('lobby')}
                                    className="bg-sky-500 hover:bg-sky-600 text-white font-extrabold p-3.5 rounded-2xl shadow-md transition flex items-center justify-center space-x-2 border-b-4 border-sky-700 sm:col-span-2"
                                >
                                    <i className="fas fa-home"></i>
                                    <span>Kembali ke Lobi Utama</span>
                                </button>
                            </div>

                            {/* Answer review ledger */}
                            <div className="w-full mt-6 bg-slate-50 rounded-2xl border border-slate-200 p-4 text-left max-h-48 overflow-y-auto">
                                <h4 className="font-bold text-slate-700 text-sm mb-2 flex items-center">
                                    <i className="fas fa-list-check mr-1.5 text-blue-500"></i> Review Jawaban Kamu:
                                </h4>
                                <div className="space-y-1 text-xs">
                                    {answersLog.map((log, i) => (
                                        <div key={i} className="flex justify-between border-b border-slate-100 py-1">
                                            <span className="font-semibold text-slate-600">{i+1}. {log.questionText}</span>
                                            <span className="flex items-center space-x-1">
                                                <span className="text-gray-500">Jawab: {log.userAnswer}</span>
                                                {log.isCorrect ? (
                                                    <i className="fas fa-check-circle text-green-500 ml-1"></i>
                                                ) : (
                                                    <span className="flex items-center">
                                                        <i className="fas fa-times-circle text-red-500 ml-1"></i>
                                                        <span className="text-[10px] text-green-600 ml-1 font-bold">({log.correctAnswer})</span>
                                                    </span>
                                                )}
                                            </span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    );
                })()}

                {/* SAVED GAME TRANSACTION LEDGER PAGE WITH ANALYTICAL CATEGORY SUMMARY */}
                {currentPage === 'history' && (() => {
                    // Extract analytical performance for each category
                    const statsPerkalian = getCategoryStats('perkalian');
                    const statsPembagian = getCategoryStats('pembagian');
                    const statsPenambahan = getCategoryStats('penambahan');
                    const statsPengurangan = getCategoryStats('pengurangan');

                    return (
                        <div className="flex flex-col flex-grow animate-fadeIn">
                            <div className="flex items-center justify-between mb-4">
                                <button 
                                    onClick={() => setCurrentPage('lobby')}
                                    className="text-green-700 hover:text-green-900 font-bold flex items-center space-x-2 bg-green-100 hover:bg-green-200 px-3 py-1.5 rounded-xl transition"
                                >
                                    <i className="fas fa-arrow-left"></i>
                                    <span>Kembali ke Lobi</span>
                                </button>
                                
                                {savedGames.length > 0 && (
                                    <button 
                                        onClick={() => setShowClearConfirm(true)}
                                        className="text-red-600 hover:text-red-800 font-semibold text-sm flex items-center space-x-1.5 bg-red-50 hover:bg-red-100 px-3 py-1.5 rounded-xl transition border border-red-200"
                                    >
                                        <i className="fas fa-trash-alt"></i>
                                        <span>Hapus Semua</span>
                                    </button>
                                )}
                            </div>

                            <div className="mb-4 text-center sm:text-left">
                                <h2 className="text-2xl sm:text-3xl title-font text-slate-800 flex items-center justify-center sm:justify-start space-x-2">
                                    <i className="fas fa-receipt text-amber-500"></i>
                                    <span>Transaksi Riwayat Nilai</span>
                                </h2>
                                <p className="text-gray-600 text-sm mt-1">
                                    Berikut data transaksi nilai pengerjaan dan statistik persentase keberhasilan per kategori.
                                </p>
                            </div>

                            {/* NEW DETAILED TRANSACTION SUMMARY - PERCENTAGE MASTER CARD */}
                            <div className="bg-gradient-to-br from-emerald-500 to-green-600 rounded-2xl p-4 text-white shadow-md mb-6">
                                <h3 className="text-sm font-extrabold uppercase tracking-widest text-emerald-100 mb-3 flex items-center">
                                    <i className="fas fa-chart-line mr-2"></i> Rata-rata Persentase Kategori
                                </h3>
                                <div className="grid grid-cols-2 gap-3">
                                    {/* Perkalian Stats */}
                                    <div className="bg-white/10 rounded-xl p-2.5 border border-white/10 flex flex-col justify-between">
                                        <span className="text-xs font-bold text-emerald-100">Perkalian</span>
                                        <div className="flex items-baseline space-x-1 mt-1">
                                            <span className="text-2xl font-black">{statsPerkalian.count > 0 ? `${statsPerkalian.averagePercent}%` : '-'}</span>
                                            <span className="text-[10px] text-emerald-100 font-medium">({statsPerkalian.count}x main)</span>
                                        </div>
                                    </div>

                                    {/* Pembagian Stats */}
                                    <div className="bg-white/10 rounded-xl p-2.5 border border-white/10 flex flex-col justify-between">
                                        <span className="text-xs font-bold text-emerald-100">Pembagian</span>
                                        <div className="flex items-baseline space-x-1 mt-1">
                                            <span className="text-2xl font-black">{statsPembagian.count > 0 ? `${statsPembagian.averagePercent}%` : '-'}</span>
                                            <span className="text-[10px] text-emerald-100 font-medium">({statsPembagian.count}x main)</span>
                                        </div>
                                    </div>

                                    {/* Penambahan Stats */}
                                    <div className="bg-white/10 rounded-xl p-2.5 border border-white/10 flex flex-col justify-between">
                                        <span className="text-xs font-bold text-emerald-100">Penambahan</span>
                                        <div className="flex items-baseline space-x-1 mt-1">
                                            <span className="text-2xl font-black">{statsPenambahan.count > 0 ? `${statsPenambahan.averagePercent}%` : '-'}</span>
                                            <span className="text-[10px] text-emerald-100 font-medium">({statsPenambahan.count}x main)</span>
                                        </div>
                                    </div>

                                    {/* Pengurangan Stats */}
                                    <div className="bg-white/10 rounded-xl p-2.5 border border-white/10 flex flex-col justify-between">
                                        <span className="text-xs font-bold text-emerald-100">Pengurangan</span>
                                        <div className="flex items-baseline space-x-1 mt-1">
                                            <span className="text-2xl font-black">{statsPengurangan.count > 0 ? `${statsPengurangan.averagePercent}%` : '-'}</span>
                                            <span className="text-[10px] text-emerald-100 font-medium">({statsPengurangan.count}x main)</span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* History table log list */}
                            <div className="flex-grow overflow-y-auto max-h-[220px] border border-gray-200 rounded-2xl shadow-inner bg-slate-50 p-2">
                                {savedGames.length === 0 ? (
                                    <div className="flex flex-col items-center justify-center py-12 text-center text-gray-400">
                                        <i className="fas fa-folder-open text-4xl mb-3 text-gray-300 animate-bounce"></i>
                                        <p className="font-semibold text-sm">Belum Ada Transaksi Tersimpan</p>
                                        <p className="text-xs px-6 mt-1">Selesaikan kuis di salah satu kategori lalu klik "Simpan Hasil Transaksi" untuk mendata tanggal nilai.</p>
                                    </div>
                                ) : (
                                    <div className="space-y-3">
                                        {savedGames.map((tx) => (
                                            <div key={tx.id} className="bg-white border border-gray-100 p-4 rounded-xl shadow-sm flex flex-col sm:flex-row sm:items-center justify-between gap-3">
                                                <div>
                                                    <div className="flex items-center space-x-2">
                                                        <span className="bg-green-100 text-green-800 text-xs font-bold px-2.5 py-0.5 rounded-full capitalize">
                                                            {tx.category}
                                                        </span>
                                                        <span className="text-[10px] text-gray-400 font-semibold">{tx.id}</span>
                                                    </div>
                                                    <div className="text-gray-700 font-bold text-sm mt-1.5 flex items-center">
                                                        <i className="far fa-calendar-alt text-gray-400 mr-1.5"></i>
                                                        <span>{tx.date}</span>
                                                        <span className="mx-1.5 text-gray-300">|</span>
                                                        <i className="far fa-clock text-gray-400 mr-1"></i>
                                                        <span>{tx.time}</span>
                                                    </div>
                                                </div>

                                                <div className="flex items-center justify-between sm:justify-end gap-4 border-t sm:border-t-0 pt-2 sm:pt-0 border-gray-100">
                                                    <div className="text-right">
                                                        <div className="text-xs text-gray-400 font-semibold">Skor Akhir</div>
                                                        <div className="text-lg font-bold text-slate-800">{tx.score} / {tx.total}</div>
                                                    </div>
                                                    <div className={`w-14 h-14 rounded-full flex flex-col items-center justify-center border-2 ${
                                                        tx.percent >= 75 
                                                        ? 'bg-green-50 border-green-500 text-green-700' 
                                                        : tx.percent >= 50 
                                                        ? 'bg-yellow-50 border-yellow-500 text-yellow-700' 
                                                        : 'bg-red-50 border-red-500 text-red-700'
                                                    }`}>
                                                        <span className="text-sm font-black leading-none">{tx.percent}</span>
                                                        <span className="text-[8px] font-bold">%</span>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>

                            {/* Export or backup advice */}
                            <div className="mt-4 bg-amber-50 rounded-xl p-3 border border-amber-100 text-xs text-amber-800 flex items-start space-x-2">
                                <i className="fas fa-info-circle text-sm mt-0.5 text-amber-500"></i>
                                <p>
                                    Riwayat transaksi otomatis direkam pada perangkat ini. Rata-rata persentase di atas mencerminkan penguasaan siswa pada setiap operasi hitung matematika.
                                </p>
                            </div>
                        </div>
                    );
                })()}

                {/* Decorative Bottom Corner Watermark Footer */}
                <div className="mt-6 pt-4 border-t border-gray-100 flex items-center justify-between text-xs text-gray-400 font-medium">
                    <span>© 2026 MyKi Math CAP</span>
                    <span>Didesain oleh Mery Sauyai</span>
                </div>
            </div>
        );
    }

    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
</script>

</body>
</html>
